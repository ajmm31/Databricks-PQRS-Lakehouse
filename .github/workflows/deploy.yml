name: CI/CD Databricks - Proyecto PQRS
on:
  push:
    branches:
      - main

env:
  CLUSTER_NAME: "ClusterSD-dev"
  DEST_BASE: "/Workspace/Users/ajmm31@hotmail.com/PQRS_Prod"
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Install jq & curl
      run: sudo apt-get update && sudo apt-get install -y jq curl
    
    - name: Deploy notebooks to Destination Workspace
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_TOKEN }}
        
        # Crear la carpeta principal en Databricks
        curl -s -X POST -H "Authorization: Bearer $DEST_TOKEN" -H "Content-Type: application/json" -d "{\"path\":\"${{ env.DEST_BASE }}\"}" "$DEST_HOST/api/2.0/workspace/mkdirs"
        
    # Subir todos los archivos
    - name: Upload Databricks Notebooks
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_TOKEN }}
        
        echo "🔍 Escaneando archivos en el repositorio (para verificar mayúsculas/minúsculas):"
        ls -R
        echo "---------------------------------------------------"
        
        # Función universal para subir archivos a Databricks
        upload_file() {
          local local_file=$1
          local format=$2
          local language=$3
          
          # Validación de seguridad: Comprobar que el archivo realmente existe
          if [ ! -f "$local_file" ]; then
            echo "❌ ERROR FATAL: No se encuentra '$local_file'."
            echo "💡 Revisa que las mayúsculas/minúsculas coincidan EXACTAMENTE con GitHub."
            exit 1
          fi
          
          # Quitamos la extensión local (.ipynb o .sql) para el nombre en Databricks
          local filename=$(basename "$local_file")
          local name_no_ext="${filename%.*}"
          local dest_path="${{ env.DEST_BASE }}/$name_no_ext"
          
          echo "✅ Subiendo $local_file -> $dest_path ($format)"
          
          if [ -n "$language" ]; then
            curl -s -X POST -H "Authorization: Bearer $DEST_TOKEN" -H "Content-Type: multipart/form-data" \
              -F "path=$dest_path" -F "format=$format" -F "language=$language" -F "overwrite=true" -F "content=@$local_file" \
              "$DEST_HOST/api/2.0/workspace/import" > /dev/null
          else
            curl -s -X POST -H "Authorization: Bearer $DEST_TOKEN" -H "Content-Type: multipart/form-data" \
              -F "path=$dest_path" -F "format=$format" -F "overwrite=true" -F "content=@$local_file" \
              "$DEST_HOST/api/2.0/workspace/import" > /dev/null
          fi
        }

        # Subir archivos Jupyter
        upload_file "PrepAmb/00_preparacion_ambiente.ipynb" "JUPYTER" ""

        upload_file "proceso/01_extract.ipynb" "JUPYTER" ""
        upload_file "proceso/02_transform.ipynb" "JUPYTER" ""
        upload_file "proceso/03_load.ipynb" "JUPYTER" ""
        upload_file "proceso/04_advanced_delta.ipynb" "JUPYTER" ""
        
        # Subir el nuevo archivo de reversión (Asegúrate de que la ruta física coincida con la carpeta de tu repositorio, ej. 'reversion/')
        upload_file "reversion/99_reversion.ipynb" "JUPYTER" ""
        
        # Subir archivo SQL (Se mantiene el de grants)
        upload_file "seguridad/01_grants_seguridad.sql" "SOURCE" "SQL"

    - name: Check if workflow exists and delete if necessary
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_TOKEN }}
        WORKFLOW_NAME="WF_PQRS_MEDALLION"
        
        workflows_response=$(curl -s -X GET -H "Authorization: Bearer $DEST_TOKEN" "$DEST_HOST/api/2.1/jobs/list")
        existing_job_id=$(echo "$workflows_response" | jq -r --arg name "$WORKFLOW_NAME" '.jobs[]? | select(.settings.name == $name) | .job_id')
        
        if [ "$existing_job_id" != "" ] && [ "$existing_job_id" != "null" ]; then
          echo "Eliminando Workflow anterior ID: $existing_job_id"
          curl -s -X POST -H "Authorization: Bearer $DEST_TOKEN" -H "Content-Type: application/json" -d "{\"job_id\": $existing_job_id}" "$DEST_HOST/api/2.1/jobs/delete" > /dev/null
        fi
    
    - name: Get existing cluster ID
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_TOKEN }}
        
        clusters_response=$(curl -s -X GET -H "Authorization: Bearer $DEST_TOKEN" "$DEST_HOST/api/2.0/clusters/list")
        cluster_id=$(echo "$clusters_response" | jq -r --arg name "${{ env.CLUSTER_NAME }}" '.clusters[]? | select(.cluster_name == $name) | .cluster_id')
        
        if [ "$cluster_id" != "" ] && [ "$cluster_id" != "null" ]; then
          echo "CLUSTER_ID=$cluster_id" >> $GITHUB_ENV
        else
          echo "❌ No se encontró el cluster: ${{ env.CLUSTER_NAME }}"
          exit 1
        fi
    
    - name: Create Databricks Workflow
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_TOKEN }}
        CLUSTER_ID="${{ env.CLUSTER_ID }}"
        
        cat > workflow_config.json << EOF
        {
          "name": "WF_PQRS_MEDALLION",
          "format": "MULTI_TASK",
          "tasks": [
            {
              "task_key": "1_PrepAmb",
              "notebook_task": { "notebook_path": "${{ env.DEST_BASE }}/00_preparacion_ambiente", "source": "WORKSPACE" },
              "existing_cluster_id": "$CLUSTER_ID"
            },
            {
              "task_key": "2_Extract",
              "depends_on": [{"task_key": "1_PrepAmb"}],
              "notebook_task": { "notebook_path": "${{ env.DEST_BASE }}/01_extract", "source": "WORKSPACE" },
              "existing_cluster_id": "$CLUSTER_ID"
            },
            {
              "task_key": "3_Transform",
              "depends_on": [{"task_key": "2_Extract"}],
              "notebook_task": { "notebook_path": "${{ env.DEST_BASE }}/02_transform", "source": "WORKSPACE" },
              "existing_cluster_id": "$CLUSTER_ID"
            },
            {
              "task_key": "4_Load",
              "depends_on": [{"task_key": "3_Transform"}],
              "notebook_task": { "notebook_path": "${{ env.DEST_BASE }}/03_load", "source": "WORKSPACE" },
              "existing_cluster_id": "$CLUSTER_ID"
            },
            {
              "task_key": "5_Delta",
              "depends_on": [{"task_key": "4_Load"}],
              "notebook_task": { "notebook_path": "${{ env.DEST_BASE }}/04_advanced_delta", "source": "WORKSPACE" },
              "existing_cluster_id": "$CLUSTER_ID"
            },
            {
              "task_key": "6_Grants",
              "depends_on": [{"task_key": "5_Delta"}],
              "notebook_task": { 
                "notebook_path": "${{ env.DEST_BASE }}/01_grants_seguridad", "source": "WORKSPACE" 
              },
              "existing_cluster_id": "$CLUSTER_ID"
            }
          ]
        }
        EOF
        
        create_response=$(curl -s -X POST -H "Authorization: Bearer $DEST_TOKEN" -H "Content-Type: application/json" -d @workflow_config.json "$DEST_HOST/api/2.1/jobs/create")
        job_id=$(echo "$create_response" | jq -r '.job_id')
        
        if [ "$job_id" != "" ] && [ "$job_id" != "null" ]; then
          echo "✅ Workflow creado con ID: $job_id"
          echo "WORKFLOW_JOB_ID=$job_id" >> $GITHUB_ENV
        else
          echo "❌ Error al crear el workflow: $create_response"
          exit 1
        fi

    - name: Execute Workflow
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_TOKEN }}
        JOB_ID="${{ env.WORKFLOW_JOB_ID }}"
        
        run_response=$(curl -s -X POST -H "Authorization: Bearer $DEST_TOKEN" -H "Content-Type: application/json" -d "{\"job_id\": $JOB_ID}" "$DEST_HOST/api/2.1/jobs/run-now")
        run_id=$(echo "$run_response" | jq -r '.run_id')
        
        if [ "$run_id" != "" ] && [ "$run_id" != "null" ]; then
          echo "🎯 Workflow ejecutado! Run ID: $run_id"
        else
          echo "❌ Error al ejecutar el workflow: $run_response"
          exit 1
        fi